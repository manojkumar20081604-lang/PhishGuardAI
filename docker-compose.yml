# PhishGuard AI - Docker Compose
# For local development and production

version: '3.8'

services:
  phishguard:
    build: .
    container_name: phishguard_ai
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=phishguard-secret-key-prod
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SMTP_EMAIL=${SMTP_EMAIL:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
    volumes:
      - phishguard_data:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  phishguard_data:

networks:
  default:
    name: phishguard_network